name: News Bot

on:
  schedule:
    - cron: '*/5 * * * *'   # tiap 5 menit (AMAN)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: news-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-v1

      - name: Run bot (retry + log)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          for i in 1 2 3
          do
            echo "Attempt $i"
            python news_bot_once.py >> bot.log 2>&1 && break
            sleep 3
          done

      - name: Save cache
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-v1

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: bot.log

      - name: Notify if failed
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHANNEL_ID }} \
          -d text="🚨 News Bot ERROR di GitHub Actions"
