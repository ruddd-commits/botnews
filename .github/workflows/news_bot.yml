name: News Bot

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ⚡ Cache pip biar lebih cepat
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependensi
        run: |
          pip install -r requirements.txt || pip install feedparser requests python-dotenv schedule

      # 📦 Cache artikel (biar gak duplicate)
      - name: Restore cache artikel
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_id }}
          restore-keys: seen-articles-

      # 🔁 Retry + logging
      - name: Jalankan bot (retry + log)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          for i in 1 2 3
          do
            echo "===== Attempt $i ====="
            python news_bot_once.py >> bot.log 2>&1 && break
            echo "Gagal attempt $i" >> bot.log
            sleep 5
          done

      # 📜 Simpan log selalu
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: bot.log

      # 🚨 Notifikasi kalau gagal
      - name: Notify Telegram on Failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHANNEL_ID }} \
          -d text="🚨 News Bot GAGAL di GitHub Actions! Cek log sekarang."
